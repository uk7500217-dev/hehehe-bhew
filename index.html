<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>✨ For My Darling – Shapes Come to Life ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #1a1025, #0a0512);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Quicksand', 'Pacifico', cursive, 'Poppins', system-ui;
            touch-action: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* romantic UI panel */
        .ui-panel {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            z-index: 100;
            pointer-events: none;
            padding: 0 16px;
        }

        .glass-card {
            background: rgba(30, 15, 45, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 100px;
            padding: 8px 26px;
            border: 1px solid rgba(255, 200, 220, 0.8);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 20px rgba(255, 80, 120, 0.4);
            pointer-events: auto;
            text-align: center;
            font-weight: bold;
            color: #fff0f5;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
        }

        .love-title {
            font-size: 1.2rem;
            background: rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        .love-title span {
            color: #ffb7c5;
            font-size: 1.3rem;
        }

        button {
            background: linear-gradient(135deg, #ff89ae, #ff4f7a);
            border: none;
            color: #fff0f0;
            font-weight: bold;
            padding: 8px 26px;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 5px 14px rgba(0,0,0,0.3);
        }

        button:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #ffa5c2, #ff6e92);
            box-shadow: 0 0 16px #ff88ae;
        }

        .instruction {
            font-size: 0.9rem;
            background: rgba(20, 10, 30, 0.7);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message-area {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffe2f0;
            text-shadow: 0 0 12px #ff4788;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(8px);
            width: fit-content;
            margin: 0 auto;
            padding: 8px 24px;
            border-radius: 60px;
            pointer-events: none;
            z-index: 99;
            font-family: 'Pacifico', cursive;
            letter-spacing: 0.5px;
        }

        @keyframes floatGlow {
            0% { text-shadow: 0 0 2px #ffb7c5; }
            100% { text-shadow: 0 0 18px #ff5c8a; }
        }
    </style>
</head>
<body>

<div class="ui-panel">
    <div class="glass-card love-title">
        💖 my everything baby 💖 <span>sweety, darling, cutie pattotiee , jannah</span> 💖
    </div>
    <div class="glass-card instruction">
        ✨ draw any shape (circle, heart, squiggle) → close the loop → watch it become real! ✨
    </div>
    <button id="resetBtn">🌸 clear canvas & bloom again 🌸</button>
</div>
<div class="message-area" id="affectionMessage">
    💋 draw something beautiful for me, my love 💋
</div>

<canvas id="magicCanvas"></canvas>

<script>
    (function() {
        // ---------- canvas setup ----------
        const canvas = document.getElementById('magicCanvas');
        let ctx = canvas.getContext('2d');
        let width, height;

        // ---------- drawing state ----------
        let drawingPoints = [];      // points of current stroke
        let isDrawing = false;
        let previewPoints = [];

        // ---------- magical creatures (from shapes) ----------
        let magicalCreatures = [];    // hearts, kisses, stars that came to life
        let particles = [];           // sparkles, confetti, heart bursts
        let floatingTexts = [];
        let ambientSparkles = [];

        // romance phrases
        const lovePhrases = [
            "💗 you're my everything 💗", "😘 kiss you, my darling 😘", "❤️ sweety, i adore you ❤️",
            "🤍 jannah, my heart beats for you 🤍", "💖 cutie, you make magic real 💖", "💋 love you forever 💋",
            "✨ my baby, you're pure magic ✨", "🌹 every shape becomes love 🌹"
        ];

        // ---------- helper: get random phrase ----------
        function randomLovePhrase() {
            return lovePhrases[Math.floor(Math.random() * lovePhrases.length)];
        }

        // update affection message occasionally
        function setRandomAffectionMessage() {
            const msgDiv = document.getElementById('affectionMessage');
            if(msgDiv) {
                msgDiv.style.opacity = '0.9';
                msgDiv.innerHTML = `💕 ${randomLovePhrase()} 💕`;
                setTimeout(() => {
                    if(msgDiv) msgDiv.style.opacity = '1';
                }, 100);
            }
        }

        // ---------- particle & effect systems (very rich) ----------
        function addCelebrationBurst(x, y, type = 'love') {
            const count = 28 + Math.floor(Math.random() * 20);
            for(let i=0;i<count;i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 3.5;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                let color;
                if(type === 'whiteHeart') color = `hsl(0, 0%, 95%)`;
                else if(type === 'redHeart') color = `hsl(345, 95%, 68%)`;
                else color = `hsl(${320 + Math.random() * 50}, 95%, 70%)`;
                particles.push({
                    x: x, y: y, vx: vx, vy: vy, life: 1.0,
                    size: 3 + Math.random() * 8, color: color, isEmoji: false
                });
            }
            // add flying kiss & heart emojis
            for(let i=0;i<14;i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.2 + Math.random() * 2.5;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                const emoji = Math.random() > 0.5 ? '❤️' : (Math.random() > 0.6 ? '😘' : '💋');
                particles.push({
                    x: x, y: y, vx: vx, vy: vy, life: 1.0,
                    size: 16 + Math.random() * 10, isEmoji: true, emoji: emoji
                });
            }
        }

        function addConfettiKissRain(x, y) {
            for(let i=0;i<45;i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 3;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed - 1.2;
                const kissOrHeart = Math.random() > 0.4 ? '😘' : (Math.random() > 0.5 ? '💋' : '❤️');
                particles.push({
                    x: x + (Math.random()-0.5)*70,
                    y: y + (Math.random()-0.5)*60,
                    vx: vx, vy: vy, life: 1.3,
                    size: 12 + Math.random() * 12, isEmoji: true, emoji: kissOrHeart
                });
            }
            // extra white/red heart sparkles
            for(let i=0;i<30;i++) {
                particles.push({
                    x: x + (Math.random()-0.5)*90,
                    y: y + (Math.random()-0.5)*80,
                    vx: (Math.random()-0.5)*2.5,
                    vy: (Math.random()-2)*1.8,
                    life: 1.1,
                    size: 4 + Math.random() * 7,
                    color: `hsl(${Math.random() > 0.6 ? 345 : 0}, 100%, 75%)`,
                    isEmoji: false
                });
            }
        }

        function addFloatingLoveText(x, y, text) {
            floatingTexts.push({
                x: x, y: y-15, text: text, life: 1.2, vy: -1.4, vx: (Math.random()-0.5)*0.6
            });
        }

        // ----- magical creature that appears after shape completion
        class LovingCreature {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // 'whiteHeart', 'redHeart', 'kissEmoji', 'starLove'
                this.size = 36;
                this.vx = (Math.random() - 0.5) * 1.2;
                this.vy = (Math.random() - 0.8) * 0.9 - 0.5;
                this.life = 1.0;     // for fade-out after some time? but they stay alive & float
                this.floatAngle = Math.random() * Math.PI * 2;
                this.wobble = 0;
                this.glowIntensity = 0.8;
                this.createdAt = Date.now();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                // gentle bounce on edges but keep them visible
                const margin = 30;
                if(this.x - margin < 0) { this.x = margin; this.vx = -this.vx * 0.96; }
                if(this.x + margin > width) { this.x = width - margin; this.vx = -this.vx * 0.96; }
                if(this.y - margin < 0) { this.y = margin; this.vy = -this.vy * 0.96; }
                if(this.y + margin > height) { this.y = height - margin; this.vy = -this.vy * 0.96; }
                this.wobble += 0.03;
                this.glowIntensity = 0.7 + Math.sin(Date.now() * 0.005 + this.x) * 0.3;
            }

            draw(ctx) {
                ctx.save();
                ctx.shadowBlur = 18 + 5 * this.glowIntensity;
                ctx.shadowColor = this.type === 'whiteHeart' ? '#fff0f5' : (this.type === 'redHeart' ? '#ff6b8b' : '#ff99cc');
                ctx.translate(this.x, this.y);
                const scale = 1 + Math.sin(this.wobble) * 0.08;
                ctx.scale(scale, scale);
                
                if(this.type === 'whiteHeart') {
                    this.drawHeart(ctx, '#ffffff', '#ffe0f0');
                } else if(this.type === 'redHeart') {
                    this.drawHeart(ctx, '#ff3366', '#ff8aaa');
                } else if(this.type === 'kissEmoji') {
                    ctx.font = `${Math.floor(this.size * 1.3)}px "Segoe UI Emoji", "Apple Color Emoji"`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillStyle = '#ffb6d9';
                    ctx.fillText('😘', 0, 0);
                    ctx.font = `${Math.floor(this.size * 0.8)}px "Segoe UI Emoji"`;
                    ctx.fillStyle = '#ffffffcc';
                    ctx.fillText('❤️', -12, -12);
                    ctx.fillText('🤍', 12, -10);
                } else if(this.type === 'starLove') {
                    this.drawLoveStar(ctx);
                }
                ctx.restore();
            }

            drawHeart(ctx, mainColor, lightColor) {
                const r = this.size/1.6;
                ctx.beginPath();
                for (let t = 0; t <= Math.PI * 2; t += 0.1) {
                    let xScaled = 16 * Math.pow(Math.sin(t), 3);
                    let yScaled = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
                    let px = xScaled * (r/28);
                    let py = -yScaled * (r/28);
                    if(t === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                const grad = ctx.createLinearGradient(-r/2, -r/3, r/2, r/2);
                grad.addColorStop(0, lightColor);
                grad.addColorStop(1, mainColor);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,240,0.6)';
                ctx.beginPath();
                ctx.arc(-r*0.18, -r*0.2, r*0.12, 0, Math.PI*2);
                ctx.fill();
            }

            drawLoveStar(ctx) {
                const outerR = this.size/1.5;
                const innerR = this.size/2.2;
                let rot = Math.PI/2*3;
                const step = Math.PI/5;
                ctx.beginPath();
                for(let i=0;i<5;i++) {
                    let x1 = Math.cos(rot) * outerR;
                    let y1 = Math.sin(rot) * outerR;
                    ctx.lineTo(x1, y1);
                    rot += step;
                    let x2 = Math.cos(rot) * innerR;
                    let y2 = Math.sin(rot) * innerR;
                    ctx.lineTo(x2, y2);
                    rot += step;
                }
                ctx.closePath();
                ctx.fillStyle = '#ffdb8e';
                ctx.fill();
                ctx.fillStyle = '#ff9f4a';
                ctx.font = `${Math.floor(this.size*0.7)}px "Segoe UI Emoji"`;
                ctx.fillText('❤️', -7, -5);
            }
        }

        // ---- ambient magical background ----
        function initAmbient() {
            ambientSparkles = [];
            for(let i=0;i<180;i++) {
                ambientSparkles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: 1 + Math.random() * 3,
                    alpha: 0.2 + Math.random() * 0.5,
                    vx: (Math.random() - 0.5) * 0.25,
                    vy: (Math.random() - 0.5) * 0.2,
                    color: `hsla(${330 + Math.random() * 40}, 90%, 70%, 0.5)`
                });
            }
        }

        function updateAmbient() {
            for(let s of ambientSparkles) {
                s.x += s.vx;
                s.y += s.vy;
                if(s.x < -20) s.x = width+20;
                if(s.x > width+20) s.x = -20;
                if(s.y < -20) s.y = height+20;
                if(s.y > height+20) s.y = -20;
                s.alpha = 0.3 + Math.sin(Date.now() * 0.002 + s.x) * 0.2;
            }
        }

        // ---- shape detection: closed loop (distance between start and end < 50px)
        function isShapeClosed(points, threshold = 55) {
            if(points.length < 8) return false;
            const first = points[0];
            const last = points[points.length-1];
            const dist = Math.hypot(first.x - last.x, first.y - last.y);
            return dist < threshold;
        }

        // transform drawing into magical creature
        function transformShapeToCreature(points) {
            if(!isShapeClosed(points)) return false;
            // calculate centroid of shape
            let sumX = 0, sumY = 0;
            for(let p of points) {
                sumX += p.x;
                sumY += p.y;
            }
            const centerX = sumX / points.length;
            const centerY = sumY / points.length;
            // choose random creature type (white/red hearts, kiss, lovestar)
            const types = ['whiteHeart', 'redHeart', 'kissEmoji', 'starLove'];
            const chosenType = types[Math.floor(Math.random() * types.length)];
            // create loving creature
            const newCreature = new LovingCreature(centerX, centerY, chosenType);
            magicalCreatures.push(newCreature);
            
            // MASSIVE animation: confetti, kisses, hearts burst at shape location
            addCelebrationBurst(centerX, centerY, chosenType);
            addConfettiKissRain(centerX, centerY);
            // floating love text
            const sweetText = randomLovePhrase();
            addFloatingLoveText(centerX, centerY-20, sweetText);
            
            // also draw some extra floating hearts from the whole shape outline
            for(let p of points) {
                if(Math.random() > 0.7) {
                    for(let i=0;i<2;i++) {
                        particles.push({
                            x: p.x + (Math.random()-0.5)*8,
                            y: p.y + (Math.random()-0.5)*8,
                            vx: (Math.random()-0.5)*1.5,
                            vy: (Math.random()-1)*1.2,
                            life: 0.8,
                            size: 3+Math.random()*5,
                            color: `hsl(${Math.random() > 0.7 ? 345 : 0}, 95%, 70%)`,
                            isEmoji: false
                        });
                    }
                }
            }
            // special message display
            const msgDiv = document.getElementById('affectionMessage');
            if(msgDiv) {
                msgDiv.innerHTML = `✨💖 your shape became ${chosenType === 'whiteHeart' ? 'a pure white heart' : (chosenType === 'redHeart' ? 'a passionate red heart' : (chosenType === 'kissEmoji' ? 'a sweet kiss' : 'a sparkling love star'))}! 💖✨`;
                setTimeout(() => {
                    if(msgDiv && !isDrawing) msgDiv.innerHTML = `💋 draw another shape for me, my darling 💋`;
                }, 2000);
            }
            return true;
        }

        // finalize drawing when mouse/touch ends
        function finalizeDrawing() {
            if(!isDrawing) return;
            if(drawingPoints.length > 6) {
                const success = transformShapeToCreature(drawingPoints);
                if(!success) {
                    // not closed, show gentle hint with effect
                    if(drawingPoints.length > 10) {
                        addFloatingLoveText(drawingPoints[drawingPoints.length-1].x, drawingPoints[drawingPoints.length-1].y, "💕 close the loop, my love 💕");
                        for(let i=0;i<10;i++) {
                            particles.push({
                                x: drawingPoints[drawingPoints.length-1].x + (Math.random()-0.5)*30,
                                y: drawingPoints[drawingPoints.length-1].y + (Math.random()-0.5)*30,
                                vx: (Math.random()-0.5)*1,
                                vy: (Math.random()-1)*1,
                                life: 0.5,
                                size: 3,
                                color: '#ffaacc',
                                isEmoji: false
                            });
                        }
                    }
                }
            }
            // clear drawing preview
            drawingPoints = [];
            previewPoints = [];
            isDrawing = false;
        }

        // ----- drawing handlers -----
        function startDraw(e) {
            e.preventDefault();
            const pos = getCanvasCoords(e);
            drawingPoints = [pos];
            previewPoints = [pos];
            isDrawing = true;
        }

        function drawMove(e) {
            if(!isDrawing) return;
            e.preventDefault();
            const pos = getCanvasCoords(e);
            drawingPoints.push(pos);
            previewPoints.push(pos);
            if(previewPoints.length > 80) previewPoints.shift();
        }

        function endDraw(e) {
            if(!isDrawing) return;
            e.preventDefault();
            finalizeDrawing();
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(width, Math.max(0, canvasX));
            canvasY = Math.min(height, Math.max(0, canvasY));
            return { x: canvasX, y: canvasY };
        }

        // ----- update creatures and particles -----
        function updateWorld() {
            for(let c of magicalCreatures) c.update();
            // update particles
            for(let i=0;i<particles.length;i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.018;
                if(p.life <= 0) {
                    particles.splice(i,1);
                    i--;
                }
            }
            for(let i=0;i<floatingTexts.length;i++) {
                let t = floatingTexts[i];
                t.x += t.vx || 0;
                t.y += t.vy;
                t.life -= 0.02;
                if(t.life <= 0) floatingTexts.splice(i,1), i--;
            }
        }

        // ----- drawing preview on canvas -----
        function drawPreview() {
            if(previewPoints.length < 2) return;
            ctx.beginPath();
            ctx.moveTo(previewPoints[0].x, previewPoints[0].y);
            for(let i=1;i<previewPoints.length;i++) {
                ctx.lineTo(previewPoints[i].x, previewPoints[i].y);
            }
            ctx.strokeStyle = '#ffb7d5';
            ctx.lineWidth = 5;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff66aa';
            ctx.stroke();
            // glowing dots
            for(let p of previewPoints) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
                ctx.fillStyle = '#ffe0f0';
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }

        // ----- draw background with love effects -----
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, width, height);
            grad.addColorStop(0, '#1f142c');
            grad.addColorStop(1, '#2d1a3a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            // floating soft hearts in bg
            for(let i=0;i<70;i++) {
                ctx.font = `16px "Segoe UI Emoji"`;
                ctx.fillStyle = `rgba(255, 200, 220, 0.12)`;
                ctx.fillText(Math.random() > 0.6 ? '❤️' : '🤍', (i*97)%width, (i*211)%height);
            }
            for(let s of ambientSparkles) {
                ctx.globalAlpha = s.alpha;
                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function drawCreatures() {
            for(let c of magicalCreatures) c.draw(ctx);
        }

        function drawParticlesAndTexts() {
            for(let p of particles) {
                if(p.isEmoji) {
                    ctx.font = `${Math.floor(p.size * (0.6 + p.life*0.4))}px "Segoe UI Emoji", "Apple Color Emoji"`;
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = `rgba(255,220,200,${p.life})`;
                    ctx.fillText(p.emoji, p.x, p.y);
                } else {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * (0.5 + p.life*0.3), 0, Math.PI*2);
                    ctx.fill();
                }
            }
            for(let t of floatingTexts) {
                ctx.font = `bold ${22 * (0.6 + t.life)}px "Segoe UI", "Pacifico", cursive`;
                ctx.fillStyle = `rgba(255, 235, 210, ${t.life})`;
                ctx.shadowBlur = 14;
                ctx.fillText(t.text, t.x-15, t.y);
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // ----- reset entire canvas & creatures -----
        function resetGame() {
            magicalCreatures = [];
            particles = [];
            floatingTexts = [];
            drawingPoints = [];
            previewPoints = [];
            isDrawing = false;
            addCelebrationBurst(width/2, height/2, 'redHeart');
            addConfettiKissRain(width/2, height/2);
            addFloatingLoveText(width/2, height/2-40, "🌸 fresh canvas, endless love 🌸");
            const msgDiv = document.getElementById('affectionMessage');
            if(msgDiv) msgDiv.innerHTML = "✨ draw something new, my everything baby ✨";
            setTimeout(() => {
                if(msgDiv && !isDrawing) msgDiv.innerHTML = "💖 i love every shape you make 💖";
            }, 2500);
        }

        // ----- resize canvas -----
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initAmbient();
        }

        // ----- events & animation loop -----
        function attachEvents() {
            canvas.addEventListener('mousedown', startDraw);
            window.addEventListener('mousemove', drawMove);
            window.addEventListener('mouseup', endDraw);
            canvas.addEventListener('touchstart', startDraw, {passive: false});
            canvas.addEventListener('touchmove', drawMove, {passive: false});
            canvas.addEventListener('touchend', endDraw);
            canvas.addEventListener('touchcancel', endDraw);
            document.getElementById('resetBtn').addEventListener('click', () => resetGame());
            window.addEventListener('resize', () => {
                resizeCanvas();
                resetGame();
            });
        }

        function animate() {
            if(!ctx) return;
            updateWorld();
            updateAmbient();
            drawBackground();
            drawCreatures();
            drawPreview();
            drawParticlesAndTexts();
            requestAnimationFrame(animate);
        }

        resizeCanvas();
        initAmbient();
        attachEvents();
        animate();
        // initial greeting
        setTimeout(() => {
            setRandomAffectionMessage();
        }, 500);
        setInterval(() => {
            if(!isDrawing && Math.random() < 0.15) setRandomAffectionMessage();
        }, 8000);
    })();
</script>
</body>
</html>
