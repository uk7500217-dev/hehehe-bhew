<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💖 draw magic for my everything baby 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0e0a1e;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Quicksand', 'Pacifico', 'Poppins', cursive, system-ui;
            touch-action: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* romantic, fresh UI — minimal glass panel */
        .love-dashboard {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            z-index: 100;
            pointer-events: none;
            padding: 0 16px;
        }

        .glass-chip {
            background: rgba(40, 25, 55, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 80px;
            padding: 8px 28px;
            border: 1px solid rgba(255, 200, 230, 0.6);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3), 0 0 18px rgba(255, 100, 150, 0.5);
            pointer-events: auto;
            font-weight: bold;
            color: #fff0fb;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .greeting {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(16px);
            font-size: 1rem;
        }

        .greeting span {
            color: #ffb7cd;
            font-weight: bold;
        }

        button {
            background: linear-gradient(125deg, #ff8aae, #ff507c);
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 26px;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }

        button:hover {
            transform: scale(1.02);
            background: linear-gradient(125deg, #ffa5c2, #ff6e92);
            box-shadow: 0 0 15px #ff88b0;
        }

        .romantic-message {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 1.2rem;
            font-family: 'Pacifico', cursive;
            color: #ffe5f0;
            text-shadow: 0 0 12px #ff4477;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 20px;
            border-radius: 60px;
            pointer-events: none;
            z-index: 99;
            white-space: nowrap;
            letter-spacing: 1px;
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-3px); }
        }
    </style>
</head>
<body>

<div class="romantic-message" id="liveMsg">
    💕 draw anything, my sweety darling cutie jannah — it becomes real 💕
</div>

<div class="love-dashboard">
    <div class="glass-chip greeting">
        ✨ for <span>my everything baby</span> ✨
    </div>
    <button id="resetMagicBtn">🌸 kiss & refresh canvas 🌸</button>
</div>

<canvas id="magicCanvas"></canvas>

<script>
    (function(){
        // ---- unique shape-to-life engine ----
        const canvas = document.getElementById('magicCanvas');
        let ctx = canvas.getContext('2d');
        let width, height;

        // drawing state
        let currentStroke = [];       // points being drawn
        let isDrawing = false;
        let previewPoints = [];

        // ---- living shapes: exact copies of drawn paths that float and animate ----
        let livingShapes = [];        // each stores { points, bounds, velocity, rotation, life, color, glow }
        let particles = [];            // sparkles, hearts, kisses
        let floatingTexts = [];
        let ambientSparkles = [];

        // romantic phrase bank (for floating texts)
        const sweetWords = [
            "💖 my everything 💖", "😘 sweety, i love you 😘", "❤️ darling, you're magic ❤️",
            "🤍 cutie jannah 🤍", "💋 kiss for you 💋", "✨ my baby, beautiful shape ✨",
            "🌸 you made this real 🌸", "💗 sweetheart, perfect 💗"
        ];

        function randomSweetText() {
            return sweetWords[Math.floor(Math.random() * sweetWords.length)];
        }

        // update top message occasionally
        function setRandomRomanceMessage() {
            const msgDiv = document.getElementById('liveMsg');
            if(msgDiv) {
                const msgs = [
                    "💕 draw a star, a heart, a cloud — it becomes alive! 💕",
                    "🌸 my darling, every line you draw turns into real magic 🌸",
                    "❤️ your shapes float with love, sweety ❤️",
                    "💋 kiss your drawing? it will dance for you 💋",
                    "🤍 jannah, my everything, watch your art come to life 🤍"
                ];
                msgDiv.innerHTML = msgs[Math.floor(Math.random() * msgs.length)];
                setTimeout(() => {
                    if(msgDiv && !isDrawing) msgDiv.innerHTML = "✨ draw anything, my love — close the loop to bring it to life ✨";
                }, 2800);
            }
        }

        // ---- ambient fairy dust ----
        function initAmbient() {
            ambientSparkles = [];
            for(let i=0;i<160;i++) {
                ambientSparkles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: 1 + Math.random() * 3.5,
                    alpha: 0.2 + Math.random() * 0.5,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: (Math.random() - 0.5) * 0.15,
                    color: `hsla(${320 + Math.random() * 50}, 90%, 75%, 0.5)`
                });
            }
        }

        function updateAmbient() {
            for(let s of ambientSparkles) {
                s.x += s.vx;
                s.y += s.vy;
                if(s.x < -20) s.x = width+20;
                if(s.x > width+20) s.x = -20;
                if(s.y < -20) s.y = height+20;
                if(s.y > height+20) s.y = -20;
                s.alpha = 0.3 + Math.sin(Date.now() * 0.002 + s.x) * 0.2;
            }
        }

        // ---- particle effects (rich, pretty, kisses & hearts) ----
        function addRichBurst(x, y, shapeColor = '#ffb3d9') {
            // sparkles
            for(let i=0;i<32;i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.2 + Math.random() * 3;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                particles.push({
                    x: x, y: y, vx: vx, vy: vy, life: 0.95,
                    size: 2 + Math.random() * 6,
                    color: `hsl(${Math.random() * 60 + 310}, 95%, 70%)`,
                    isEmoji: false
                });
            }
            // floating kisses and hearts emoji
            for(let i=0;i<18;i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.8 + Math.random() * 2.5;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed - 0.8;
                const emoji = Math.random() > 0.5 ? '❤️' : (Math.random() > 0.6 ? '😘' : '💋');
                particles.push({
                    x: x + (Math.random()-0.5)*35,
                    y: y + (Math.random()-0.5)*35,
                    vx: vx, vy: vy, life: 1.0,
                    size: 12 + Math.random() * 10,
                    isEmoji: true,
                    emoji: emoji
                });
            }
            // white & red heart confetti
            for(let i=0;i<24;i++) {
                particles.push({
                    x: x + (Math.random()-0.5)*55,
                    y: y + (Math.random()-0.5)*50,
                    vx: (Math.random()-0.5)*2.2,
                    vy: (Math.random()-2)*1.8,
                    life: 1.1,
                    size: 4 + Math.random() * 8,
                    color: `hsl(${Math.random() > 0.6 ? 345 : 0}, 98%, 72%)`,
                    isEmoji: false
                });
            }
        }

        function addCelebrationConfetti(x,y) {
            for(let i=0;i<40;i++) {
                const kissHeart = Math.random() > 0.5 ? '💋' : '❤️';
                particles.push({
                    x: x + (Math.random()-0.5)*80,
                    y: y + (Math.random()-0.5)*70,
                    vx: (Math.random()-0.5)*2.5,
                    vy: (Math.random()-2)*2,
                    life: 1.2,
                    size: 14 + Math.random() * 12,
                    isEmoji: true,
                    emoji: kissHeart
                });
            }
        }

        function addFloatingLoveText(x,y, text) {
            floatingTexts.push({
                x: x, y: y-15, text: text, life: 1.1, vy: -1.3, vx: (Math.random()-0.5)*0.6
            });
        }

        // ---- living shape class (exact drawn shape that becomes real) ----
        class LivingShape {
            constructor(points, colorHue) {
                this.originalPoints = points.slice(); // copy
                // compute centroid
                let sumX = 0, sumY = 0;
                for(let p of points) { sumX += p.x; sumY += p.y; }
                this.cx = sumX / points.length;
                this.cy = sumY / points.length;
                // translate points to local coords (relative to center)
                this.localPoints = points.map(p => ({ x: p.x - this.cx, y: p.y - this.cy }));
                this.x = this.cx;
                this.y = this.cy;
                this.vx = (Math.random() - 0.5) * 1.2;
                this.vy = (Math.random() - 0.8) * 1.0 - 0.4;
                this.rotation = 0;
                this.rotSpeed = (Math.random() - 0.5) * 0.02;
                this.scale = 1;
                this.scaleSpeed = 0.002;
                this.life = 1.0;   // not fading but alive forever, we keep them
                this.color = `hsl(${colorHue}, 85%, 70%)`;
                this.glow = 0.7;
                this.wobble = 0;
                this.created = Date.now();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                // romantic bounce with soft edges
                const margin = 40;
                if(this.x - margin < 0) { this.x = margin; this.vx = -this.vx * 0.96; }
                if(this.x + margin > width) { this.x = width - margin; this.vx = -this.vx * 0.96; }
                if(this.y - margin < 0) { this.y = margin; this.vy = -this.vy * 0.96; }
                if(this.y + margin > height) { this.y = height - margin; this.vy = -this.vy * 0.96; }
                this.rotation += this.rotSpeed;
                this.scale += this.scaleSpeed;
                if(this.scale > 1.08) this.scaleSpeed = -0.002;
                if(this.scale < 0.92) this.scaleSpeed = 0.002;
                this.wobble += 0.03;
                this.glow = 0.6 + Math.sin(Date.now() * 0.005 + this.x) * 0.3;
            }

            draw(ctx) {
                ctx.save();
                ctx.shadowBlur = 16 + 5 * this.glow;
                ctx.shadowColor = `hsl(${this.color.match(/\d+/)?.[0] || 330}, 90%, 70%)`;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(this.scale, this.scale);
                ctx.beginPath();
                // draw the exact shape using local points
                if(this.localPoints.length < 2) return;
                ctx.moveTo(this.localPoints[0].x, this.localPoints[0].y);
                for(let i=1;i<this.localPoints.length;i++) {
                    ctx.lineTo(this.localPoints[i].x, this.localPoints[i].y);
                }
                ctx.closePath();
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.strokeStyle = `rgba(255, 240, 200, 0.8)`;
                ctx.lineWidth = 2.5;
                ctx.stroke();
                // add little heart inside shape randomly (romantic)
                ctx.font = `20px "Segoe UI Emoji"`;
                ctx.fillStyle = `rgba(255,255,210,0.8)`;
                ctx.fillText('❤️', -12, -8);
                ctx.fillText('🤍', 8, 6);
                ctx.restore();
            }
        }

        // ---- detect closed shape (distance between start and end) ----
        function isClosedShape(points, threshold = 55) {
            if(points.length < 12) return false;
            const first = points[0];
            const last = points[points.length-1];
            return Math.hypot(first.x - last.x, first.y - last.y) < threshold;
        }

        // ---- turn the drawn stroke into a living shape! ----
        function materializeShape(points) {
            if(!isClosedShape(points)) {
                // gently notify to close loop
                if(points.length > 8) {
                    addFloatingLoveText(points[points.length-1].x, points[points.length-1].y-20, "💕 close the loop, my love 💕");
                    for(let i=0;i<12;i++) {
                        particles.push({
                            x: points[points.length-1].x + (Math.random()-0.5)*30,
                            y: points[points.length-1].y + (Math.random()-0.5)*30,
                            vx: (Math.random()-0.5)*1.2,
                            vy: (Math.random()-1)*1.2,
                            life: 0.6,
                            size: 3,
                            color: '#ffb3d9',
                            isEmoji: false
                        });
                    }
                }
                return false;
            }
            
            // compute a unique color based on shape position (for variety)
            const sumX = points.reduce((s,p)=>s+p.x,0)/points.length;
            const sumY = points.reduce((s,p)=>s+p.y,0)/points.length;
            const hue = ( (sumX * 0.3 + sumY * 0.5) % 360 + 310 ) % 360;
            const newLiving = new LivingShape(points, hue);
            livingShapes.push(newLiving);
            
            // massive celebration effects at shape centroid
            const centerX = sumX;
            const centerY = sumY;
            addRichBurst(centerX, centerY, `hsl(${hue},85%,70%)`);
            addCelebrationConfetti(centerX, centerY);
            const sweetMsg = randomSweetText();
            addFloatingLoveText(centerX, centerY-20, sweetMsg);
            
            // also add sparkles along the outline
            for(let p of points) {
                if(Math.random()>0.8) {
                    for(let i=0;i<2;i++) {
                        particles.push({
                            x: p.x + (Math.random()-0.5)*8,
                            y: p.y + (Math.random()-0.5)*8,
                            vx: (Math.random()-0.5)*1.2,
                            vy: (Math.random()-1)*1.1,
                            life: 0.7,
                            size: 2+Math.random()*5,
                            color: `hsl(${hue}, 95%, 70%)`,
                            isEmoji: false
                        });
                    }
                }
            }
            // update top message for joy
            const msgDiv = document.getElementById('liveMsg');
            if(msgDiv) {
                msgDiv.innerHTML = `💖 your shape is REAL! it floats with love, ${sweetMsg} 💖`;
                setTimeout(() => {
                    if(msgDiv && !isDrawing) msgDiv.innerHTML = "✨ draw another shape, my everything baby — close the loop ✨";
                }, 2800);
            }
            return true;
        }

        // finalize drawing on mouse/touch up
        function finalizeStroke() {
            if(!isDrawing) return;
            if(currentStroke.length > 6) {
                materializeShape(currentStroke);
            }
            currentStroke = [];
            previewPoints = [];
            isDrawing = false;
        }

        // drawing event handlers
        function startDraw(e) {
            e.preventDefault();
            const pos = getCanvasCoords(e);
            currentStroke = [pos];
            previewPoints = [pos];
            isDrawing = true;
        }

        function drawMove(e) {
            if(!isDrawing) return;
            e.preventDefault();
            const pos = getCanvasCoords(e);
            currentStroke.push(pos);
            previewPoints.push(pos);
            if(previewPoints.length > 90) previewPoints.shift();
        }

        function endDraw(e) {
            if(!isDrawing) return;
            e.preventDefault();
            finalizeStroke();
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(width, Math.max(0, canvasX));
            canvasY = Math.min(height, Math.max(0, canvasY));
            return { x: canvasX, y: canvasY };
        }

        // update all particles & living shapes
        function updateWorld() {
            for(let shape of livingShapes) shape.update();
            for(let i=0;i<particles.length;i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.018;
                if(p.life <= 0) {
                    particles.splice(i,1);
                    i--;
                }
            }
            for(let i=0;i<floatingTexts.length;i++) {
                let t = floatingTexts[i];
                t.x += t.vx || 0;
                t.y += t.vy;
                t.life -= 0.02;
                if(t.life <= 0) floatingTexts.splice(i,1), i--;
            }
        }

        // ---- drawing preview with romantic glow ----
        function drawPreview() {
            if(previewPoints.length < 2) return;
            ctx.beginPath();
            ctx.moveTo(previewPoints[0].x, previewPoints[0].y);
            for(let i=1;i<previewPoints.length;i++) {
                ctx.lineTo(previewPoints[i].x, previewPoints[i].y);
            }
            ctx.strokeStyle = '#ffd9e6';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ff77aa';
            ctx.stroke();
            for(let p of previewPoints) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
                ctx.fillStyle = '#fff0f5';
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }

        // ---- beautiful background with floating hearts ----
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, width*0.7, height);
            grad.addColorStop(0, '#1f142f');
            grad.addColorStop(1, '#2b1a3a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            // tiny shimmering stars
            for(let i=0;i<100;i++) {
                ctx.fillStyle = `rgba(255,220,200,${0.1+Math.sin(Date.now()*0.002+i)*0.05})`;
                ctx.beginPath();
                ctx.arc((i*131)%width, (i*257)%height, 1.2, 0, Math.PI*2);
                ctx.fill();
            }
            for(let s of ambientSparkles) {
                ctx.globalAlpha = s.alpha;
                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            // floating white/red heart silhouettes
            for(let i=0;i<60;i++) {
                ctx.font = `22px "Segoe UI Emoji"`;
                ctx.fillStyle = `rgba(255, 180, 200, 0.12)`;
                ctx.fillText(Math.random() > 0.6 ? '❤️' : '🤍', (i*93)%width, (i*173)%height);
            }
        }

        function drawLivingShapes() {
            for(let shape of livingShapes) shape.draw(ctx);
        }

        function drawParticlesAndTexts() {
            for(let p of particles) {
                if(p.isEmoji) {
                    ctx.font = `${Math.floor(p.size * (0.5 + p.life*0.5))}px "Segoe UI Emoji", "Apple Color Emoji"`;
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = `rgba(255,230,200,${p.life})`;
                    ctx.fillText(p.emoji, p.x, p.y);
                } else {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * (0.6 + p.life*0.3), 0, Math.PI*2);
                    ctx.fill();
                }
            }
            for(let t of floatingTexts) {
                ctx.font = `bold ${22 * (0.6 + t.life)}px "Segoe UI", "Pacifico", cursive`;
                ctx.fillStyle = `rgba(255, 235, 215, ${t.life})`;
                ctx.shadowBlur = 14;
                ctx.fillText(t.text, t.x-15, t.y);
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // reset everything (clear all shapes)
        function resetMagic() {
            livingShapes = [];
            particles = [];
            floatingTexts = [];
            currentStroke = [];
            previewPoints = [];
            isDrawing = false;
            addRichBurst(width/2, height/2, '#ff99cc');
            addCelebrationConfetti(width/2, height/2);
            addFloatingLoveText(width/2, height/2-40, "🌸 fresh canvas, my everything baby 🌸");
            const msgDiv = document.getElementById('liveMsg');
            if(msgDiv) msgDiv.innerHTML = "✨ draw new shapes, my sweety darling jannah ✨";
            setTimeout(() => {
                if(msgDiv && !isDrawing) msgDiv.innerHTML = "💕 every shape you draw becomes real — close the loop 💕";
            }, 2800);
        }

        // resize canvas & reinit ambient
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initAmbient();
        }

        // attach events and animation
        function attachEvents() {
            canvas.addEventListener('mousedown', startDraw);
            window.addEventListener('mousemove', drawMove);
            window.addEventListener('mouseup', endDraw);
            canvas.addEventListener('touchstart', startDraw, {passive: false});
            canvas.addEventListener('touchmove', drawMove, {passive: false});
            canvas.addEventListener('touchend', endDraw);
            canvas.addEventListener('touchcancel', endDraw);
            document.getElementById('resetMagicBtn').addEventListener('click', () => resetMagic());
            window.addEventListener('resize', () => {
                resizeCanvas();
                resetMagic();
            });
        }

        function animate() {
            if(!ctx) return;
            updateWorld();
            updateAmbient();
            drawBackground();
            drawLivingShapes();
            drawPreview();
            drawParticlesAndTexts();
            requestAnimationFrame(animate);
        }

        resizeCanvas();
        initAmbient();
        attachEvents();
        animate();
        setRandomRomanceMessage();
        setInterval(() => {
            if(!isDrawing && Math.random() < 0.12) setRandomRomanceMessage();
        }, 7000);
    })();
</script>
</body>
</html>
